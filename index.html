<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CMRL AFC Asset Management System</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height: 100vh;">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-7 col-lg-5 col-xl-4">
                
                <!-- Centralized Branding Frame Header -->
                <div class="text-center mb-4">
                    <div class="d-inline-flex align-items-center justify-content-center bg-primary-cmrl text-white rounded-circle p-3 mb-3 shadow" style="width: 80px; height: 80px;">
                        <i class="fa-solid fa-train fa-2xl"></i>
                    </div>
                    <h3 class="fw-bold text-dark mb-1">CMRL AFC</h3>
                    <p class="text-muted small text-uppercase tracking-wider">Asset Management System</p>
                </div>

                <!-- Secure Authentication Card Block -->
                <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
                    <div class="bg-active-cmrl text-white text-center py-3 fw-medium">
                        <i class="fa-solid fa-shield-halved me-2"></i>Operator Portal Sign-In
                    </div>
                    
                    <div class="card-body bg-white p-4">
                        <form id="loginForm" action="pages/dashboard.html" method="GET">
                            
                            <!-- Email Input -->
                            <div class="mb-3">
                                <label class="form-label small fw-bold text-muted" for="loginEmail">Email Address</label>
                                <div class="position-relative">
                                    <input type="email" class="form-control ps-5 py-2.5 border-light-subtle" id="loginEmail" placeholder="username@cmrl.in" required>
                                    <i class="fa-solid fa-envelope position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>
                                </div>
                            </div>

                            <!-- Password Input -->
                            <div class="mb-4">
                                <label class="form-label small fw-bold text-muted" for="loginPassword">Password</label>
                                <div class="position-relative">
                                    <input type="password" class="form-control ps-5 py-2.5 border-light-subtle" id="loginPassword" placeholder="••••••••" required>
                                    <i class="fa-solid fa-lock position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>
                                </div>
                            </div>

                            <!-- Redirects to pages/dashboard.html on click -->
                            <button type="submit" class="btn btn-primary w-100 py-2.5 fw-medium bg-primary-cmrl border-0 transition-all shadow-sm">
                                Verify & Access System
                            </button>
                        </form>
                    </div>
                    
                    <!-- Footer Info Notice -->
                    <div class="card-footer bg-light border-0 py-3 text-center">
                        <span class="text-muted small"><i class="fa-solid fa-circle-info me-1"></i> Authorized Personnel Access Only</span>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
